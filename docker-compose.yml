version: '3.8'
services:
  registry:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: registry
    container_name: registry
    ports:
      - "9080:8080"
    environment:
      - DB_PATH=devices.db
    restart: unless-stopped

  consumption:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: consumption
    container_name: consumption
    ports:
      - "9081:8080"
    environment:
      - DB_PATH=consumption.db
      - REGISTRY_URL=http://registry:8080
      - SERVICE_TOKEN=dev-token
      - LEDGER_URL=http://ledger:8080
    depends_on:
      - registry
    restart: unless-stopped

  ledger:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: ledger
    container_name: ledger
    ports:
      - "9082:8080"
    restart: unless-stopped

  lightning:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: lightning
    container_name: lightning
    ports:
      - "9083:8080"
    environment:
      LND_HOST: host.docker.internal:10001
      LND_MACAROON_HEX: "${LND_MACAROON_HEX?Error: LND_MACAROON_HEX not set}"
      LND_TLS_CERT_HEX: "${LND_TLS_CERT_HEX?Error: LND_TLS_CERT_HEX not set}"
    restart: unless-stopped