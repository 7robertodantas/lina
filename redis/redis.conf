# Redis configuration for persistence
# Enable RDB snapshots (default is already enabled, but being explicit)
# Save if at least 1 key changed in 900 seconds
save 900 1
# Save if at least 10 keys changed in 300 seconds
save 300 10
# Save if at least 10000 keys changed in 60 seconds
save 60 10000

# Enable AOF (Append Only File) for better durability
appendonly yes
appendfsync everysec

# Directory for persistence files
dir /data

# Logging
loglevel notice

