services:
  autopay:
    image: 7robertodantas/lina-autopay:latest
    container_name: autopay
    environment:
      - NETWORK=regtest
    env_file:
      - .env
    restart: unless-stopped

  smartmeter:
    image: 7robertodantas/lina-smartmeter:latest
    container_name: smartmeter
    ports:
      - "3010:8080" # UI
    environment:
      - DEVICE_ID=smart-meter-001
      - DEVICE_SECRET=smart-meter-001_password
      - MQTT_BROKER=${SMARTMETER_MQTT_BROKER}
    env_file:
      - .env
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
    restart: unless-stopped

  httpdevices:
    image: 7robertodantas/lina-httpdevices:latest
    container_name: httpdevices
    ports:
      - "3002:8080"
    env_file:
      - .env
    environment:
      - MQTT_BROKER=${HTTP_DEVICES_MQTT_BROKER}
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
    restart: unless-stopped

  prometheus:
    build:
      context: ../infrastructure/prometheus
      dockerfile: Dockerfile
    container_name: prometheus
    ports:
      - "9090:9090"  # Prometheus UI
    env_file:
      - .env
    environment:
      - PROMETHEUS_SCRAPE_JOBS=${PROMETHEUS_SCRAPE_JOBS:-ledger:9460,consumption:9465,device:9466,redis:9461,node:9463,process:9256,cadvisor:9462}
    volumes:
      - prometheus-data:/prometheus
    entrypoint:
      - /bin/sh
      - /etc/prometheus/entrypoint.sh
    command:
      - '--config.file=/tmp/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
    restart: unless-stopped

  grafana:  
    image: 7robertodantas/lina-grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # Grafana UI
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=warn
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data: