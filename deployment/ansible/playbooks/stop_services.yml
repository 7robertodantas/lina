---
# Stop systemd units on edge hosts without running a full deploy.
#
# Examples (from deployment/ansible/):
#   ansible-playbook playbooks/stop_services.yml
#   ansible-playbook playbooks/stop_services.yml -e lina_stop_services='["device-service"]'
#   ansible-playbook playbooks/stop_services.yml -e lina_stop_services='["mosquitto","device-service"]'
#   ansible-playbook playbooks/stop_services.yml -e '{"lina_stop_extra_services":["redis-server","caddy","prometheus-node-exporter","process-exporter","redis-exporter","systemd-exporter"]}'
#
# Default: stop mosquitto + all LINA Go services (ledger, lightning, consumption, device).
# Override lina_stop_services with a YAML list. Use lina_stop_extra_services for redis/caddy/exporters/etc.

- name: Stop LINA edge services
  hosts: edge
  become: true
  vars_files:
    - ../roles/lina-services/defaults/main.yml
  vars:
    lina_stop_services: "{{ ['mosquitto'] + (lina_services | map(attribute='name') | list) }}"
    lina_stop_extra_services: []

  tasks:
    - name: Stop Mosquitto broker
      ansible.builtin.systemd:
        name: mosquitto
        state: stopped
      when: "'mosquitto' in lina_stop_services"
      tags:
        - mosquitto
        - mqtt
        - broker

    - name: Stop LINA application services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop: "{{ lina_services | map(attribute='name') | list }}"
      when: item in lina_stop_services
      tags:
        - lina-services
        - apps

    - name: Stop additional units (redis, caddy, exporters, ...)
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop: "{{ lina_stop_extra_services | default([]) }}"
      when: (lina_stop_extra_services | default([]) | length) > 0
      tags:
        - extra
