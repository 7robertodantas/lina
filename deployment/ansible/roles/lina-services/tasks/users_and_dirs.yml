---
# Docker evaluation stack mounts one writable volume per service at /data (see
# deployment/docker-compose.evaluation.edge.yml). On the host we use
# {{ lina_lib_dir }}/<binary>/ with the same ownership model: each service user
# owns its subtree. The parent {{ lina_lib_dir }} must stay traversable (0755);
# if it is created implicitly with a tight umask it can end up 0700 root, and
# lina-* users cannot reach their DB paths under it.
- name: Create LINA service users
  ansible.builtin.user:
    name: "{{ item.user }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  loop: "{{ lina_services }}"

- name: Install root paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ lina_install_root }}"
    - "{{ lina_install_root }}/bin"
    - "{{ lina_config_dir }}"

- name: LINA data root (traversable by all service users)
  ansible.builtin.file:
    path: "{{ lina_lib_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Service data directories (per-service /data, like compose named volumes)
  ansible.builtin.file:
    path: "{{ lina_lib_dir }}/{{ item.binary }}"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0700"
  loop: "{{ lina_services }}"
