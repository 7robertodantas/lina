---
- name: Resolve where binaries come from on the controller
  ansible.builtin.import_tasks: resolve_binaries.yml

- name: Build Go binaries on the controller (cross-compile)
  ansible.builtin.import_tasks: build.yml
  when: lina_build_binaries | default(true) | bool

- name: Users, directories, and permissions
  ansible.builtin.import_tasks: users_and_dirs.yml

- name: gRPC edge TLS certs for device-service
  ansible.builtin.import_tasks: grpc_edge_certs.yml

- name: Install service binaries from control node
  ansible.builtin.import_tasks: binaries.yml

- name: Environment and systemd units
  ansible.builtin.import_tasks: systemd.yml
