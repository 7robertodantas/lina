---
- name: Resolve TLS certificate source on controller
  ansible.builtin.set_fact:
    lina_mosquitto_effective_certs_src: >-
      {{ lina_mosquitto_certs_src
         if (lina_mosquitto_certs_src | default('') | length) > 0
         else (playbook_dir | dirname | dirname | dirname ~ '/infrastructure/certs') }}
  when: lina_mosquitto_tls_enable | default(false) | bool
  run_once: true
  delegate_to: localhost
  become: false

- name: Verify TLS cert files exist on controller
  ansible.builtin.stat:
    path: "{{ lina_mosquitto_effective_certs_src }}/{{ item }}"
  loop:
    - ca.crt
    - server.crt
    - server.key
  register: lina_mqtt_tls_cert_stat
  when: lina_mosquitto_tls_enable | default(false) | bool
  run_once: true
  delegate_to: localhost
  become: false

- name: Fail if TLS cert missing on controller
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: >-
      Missing {{ lina_mosquitto_effective_certs_src }}/{{ item.item }} —
      run infrastructure/certs/generate-certs.sh or set lina_mosquitto_certs_src.
  loop: "{{ lina_mqtt_tls_cert_stat.results }}"
  when: lina_mosquitto_tls_enable | default(false) | bool
  run_once: true
  loop_control:
    label: "{{ item.item }}"

- name: Install Mosquitto repository signing key
  ansible.builtin.get_url:
    url: "{{ lina_mosquitto_repo_key_url }}"
    dest: "{{ lina_mosquitto_repo_keyring_path }}"
    owner: root
    group: root
    mode: "0644"
  when: lina_mosquitto_repo_enable | default(true) | bool

- name: Resolve effective Mosquitto repo suite
  ansible.builtin.set_fact:
    lina_mosquitto_repo_effective_suite: >-
      {{
        lina_mosquitto_repo_suite_fallbacks[lina_mosquitto_repo_suite]
        if (lina_mosquitto_repo_suite in lina_mosquitto_repo_suite_fallbacks)
        else lina_mosquitto_repo_suite
      }}
  when: lina_mosquitto_repo_enable | default(true) | bool

- name: Install Mosquitto apt source list for distro
  ansible.builtin.get_url:
    url: "{{ lina_mosquitto_repo_list_url }}"
    dest: "{{ lina_mosquitto_repo_list_path }}"
    owner: root
    group: root
    mode: "0644"
  when: lina_mosquitto_repo_enable | default(true) | bool

- name: Refresh apt cache after repository setup
  ansible.builtin.apt:
    update_cache: true
  when: lina_mosquitto_repo_enable | default(true) | bool

- name: Query apt candidates for Mosquitto
  ansible.builtin.command: apt-cache madison mosquitto
  register: lina_mosquitto_madison
  changed_when: false

- name: Select Mosquitto version candidate matching requested series
  ansible.builtin.set_fact:
    lina_mosquitto_candidate_versions: "{{ lina_mosquitto_madison.stdout | regex_findall('\\|\\s*([^|\\s]+)\\s*\\|') }}"
    lina_mosquitto_selected_version: ""

- name: Pick first matching Mosquitto candidate version
  ansible.builtin.set_fact:
    lina_mosquitto_selected_version: "{{ item }}"
  loop: "{{ lina_mosquitto_candidate_versions }}"
  when:
    - lina_mosquitto_selected_version | length == 0
    - (item | regex_search(lina_mosquitto_version_regex)) is not none

- name: Fail if requested Mosquitto version is unavailable
  ansible.builtin.assert:
    that:
      - lina_mosquitto_selected_version | length > 0
    fail_msg: >-
      No apt candidate for mosquitto matching regex {{ lina_mosquitto_version_regex }}.
      Parsed versions: {{ lina_mosquitto_candidate_versions | default([]) }}.
      Raw candidates: {{ lina_mosquitto_madison.stdout_lines | default([]) }}

- name: Install Mosquitto
  ansible.builtin.apt:
    name:
      - "mosquitto={{ lina_mosquitto_selected_version }}"
      - mosquitto-clients
    state: present

# Stock Debian/Ubuntu configs often define listener 1883 in mosquitto.conf or conf.d;
# 99-lina.conf adds the same ports → duplicate listener and broker exit. See README.
- name: Comment stock listener/port lines in main mosquitto.conf
  ansible.builtin.replace:
    path: /etc/mosquitto/mosquitto.conf
    regexp: '^(\s*)(listener|port)(\s+.*)$'
    replace: '\1# \2\3  # LINA: listeners in conf.d/99-lina.conf'
    backup: true
  notify: Restart mosquitto

- name: Comment stock persistence lines in main mosquitto.conf
  ansible.builtin.replace:
    path: /etc/mosquitto/mosquitto.conf
    regexp: '^(\s*)(persistence|persistence_location)(\s+.*)$'
    replace: '\1# \2\3  # LINA: persistence in conf.d/99-lina.conf'
    backup: true
  notify: Restart mosquitto

- name: Find mosquitto conf.d drop-ins
  ansible.builtin.find:
    paths: /etc/mosquitto/conf.d
    patterns: "*.conf"
    file_type: file
  register: lina_mosquitto_conf_d_files

- name: Comment listener/port lines in conf.d (except LINA drop-in)
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: '^(\s*)(listener|port)(\s+.*)$'
    replace: '\1# \2\3  # LINA: listeners in 99-lina.conf'
    backup: true
  loop: "{{ lina_mosquitto_conf_d_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: "'99-lina.conf' not in item.path"
  notify: Restart mosquitto

- name: Comment persistence lines in conf.d (except LINA drop-in)
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: '^(\s*)(persistence|persistence_location)(\s+.*)$'
    replace: '\1# \2\3  # LINA: persistence in 99-lina.conf'
    backup: true
  loop: "{{ lina_mosquitto_conf_d_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: "'99-lina.conf' not in item.path"
  notify: Restart mosquitto

- name: Discover Mosquitto dynamic security plugin path (dpkg)
  ansible.builtin.shell: dpkg -L mosquitto 2>/dev/null | grep -E 'mosquitto_dynamic_security\.so$' | head -n1
  register: lina_mosquitto_dynsec_plugin_dpkg
  changed_when: false
  failed_when: false
  when:
    - lina_mosquitto_dynsec_enable | default(true) | bool
    - (lina_mosquitto_dynsec_plugin | default('') | trim | length) == 0

- name: Set dynamic security plugin path fact
  ansible.builtin.set_fact:
    lina_mosquitto_dynsec_plugin_path: >-
      {{ lina_mosquitto_dynsec_plugin | trim if (lina_mosquitto_dynsec_plugin | default('') | trim | length) > 0
      else (lina_mosquitto_dynsec_plugin_dpkg.stdout | default('') | trim) }}
  when: lina_mosquitto_dynsec_enable | default(true) | bool

- name: Verify dynamic security plugin file exists
  ansible.builtin.stat:
    path: "{{ lina_mosquitto_dynsec_plugin_path }}"
  register: lina_mosquitto_dynsec_plugin_stat
  when: lina_mosquitto_dynsec_enable | default(true) | bool

- name: Fail if dynamic security plugin is missing
  ansible.builtin.assert:
    that:
      - (lina_mosquitto_dynsec_plugin_path | default('') | length) > 0
      - lina_mosquitto_dynsec_plugin_stat.stat.exists | default(false)
    fail_msg: >-
      mosquitto_dynamic_security.so not found (expected from mosquitto 2.x package).
      Set lina_mosquitto_dynsec_plugin to the full path to the .so file, or set
      lina_mosquitto_dynsec_enable: false for anonymous/plain auth only.
  when: lina_mosquitto_dynsec_enable | default(true) | bool

- name: Install Mosquitto dynsec init script (Docker entrypoint parity)
  ansible.builtin.template:
    src: lina-mosquitto-dynsec-init.sh.j2
    dest: "{{ lina_mosquitto_dynsec_init_script_dest }}"
    owner: root
    group: root
    mode: "0755"
  when: lina_mosquitto_dynsec_enable | default(true) | bool

- name: Initialize dynamic security datastore and permissions
  ansible.builtin.command:
    cmd: "{{ lina_mosquitto_dynsec_init_script_dest }}"
  environment:
    MQTT_DYNSEC_ADMIN_USER: "{{ lina_mqtt_dynsec_admin_user }}"
    MQTT_DYNSEC_ADMIN_PASSWORD: "{{ lina_mqtt_dynsec_admin_password }}"
  register: lina_mosquitto_dynsec_init_result
  changed_when: "'initialized successfully' in lina_mosquitto_dynsec_init_result.stdout"
  when: lina_mosquitto_dynsec_enable | default(true) | bool

- name: Ensure dynamic-security.json ownership and mode for mosquitto
  ansible.builtin.file:
    path: "{{ lina_mosquitto_dynsec_config_file }}"
    owner: mosquitto
    group: mosquitto
    mode: "0700"
    state: file
  when: lina_mosquitto_dynsec_enable | default(true) | bool

- name: Create Mosquitto TLS directory on target
  ansible.builtin.file:
    path: "{{ lina_mosquitto_cert_dir }}"
    state: directory
    owner: root
    mode: "0755"
  when: lina_mosquitto_tls_enable | default(false) | bool

- name: Copy TLS certificates for Mosquitto
  ansible.builtin.copy:
    src: "{{ lina_mosquitto_effective_certs_src }}/{{ item }}"
    dest: "{{ lina_mosquitto_cert_dir }}/{{ item }}"
    owner: root
    group: mosquitto
    mode: "{{ '0640' if item == 'server.key' else '0644' }}"
  loop:
    - ca.crt
    - server.crt
    - server.key
  when: lina_mosquitto_tls_enable | default(false) | bool
  notify: Restart mosquitto

- name: Deploy Mosquitto configuration
  ansible.builtin.template:
    src: mosquitto.conf.j2
    dest: /etc/mosquitto/conf.d/99-lina.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mosquitto

- name: Enable and start Mosquitto
  ansible.builtin.systemd:
    name: mosquitto
    enabled: true
    state: started
