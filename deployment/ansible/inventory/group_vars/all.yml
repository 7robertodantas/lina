---
# Paths on the target host (see ansible.md)
lina_install_root: /opt/lina
lina_config_dir: /etc/lina
lina_lib_dir: /var/lib/lina

# Binaries: build on the controller by default (requires Go on the machine running Ansible).
lina_build_binaries: true
lina_build_goos: linux
lina_build_goarch: arm64
lina_build_cgo_enabled: "0"
# Override repo root if ansible is not run from this repository layout
lina_repo_root: ""
# Override output dir; default is deployment/ansible/.build/<goos>-<goarch>
lina_build_output_dir: ""

# If lina_build_binaries is false: absolute path on the controller to pre-built
# device, ledger, consumption, lightning binaries.
lina_binaries_dir: ""

lina_mosquitto_tls_enable: true
lina_mosquitto_tls_port: 8883
lina_mosquitto_plain_port: 1883
# Target paths (Ansible copies from controller; see lina_mosquitto_certs_src in mosquitto role defaults)
lina_mosquitto_cert_dir: /etc/lina/mosquitto
lina_mosquitto_cafile: /etc/lina/mosquitto/ca.crt
lina_mosquitto_certfile: /etc/lina/mosquitto/server.crt
lina_mosquitto_keyfile: /etc/lina/mosquitto/server.key
# Controller: directory with ca.crt, server.crt, server.key (empty = <repo>/infrastructure/certs)
lina_mosquitto_certs_src: ""

# Device MQTT client: use TLS to broker
lina_mqtt_use_tls: true
# Dev certs often do not match hostname; set false when using real DNS + matching cert
lina_mqtt_tls_skip_verify: true
lina_mqtt_tls_server_name: ""

# Redis (optional password; leave empty for none)
lina_redis_password: ""

# Shared service auth
lina_service_token: "change-me-in-production"

# Lightning / LND (required for lightning-service; hex strings from your node)
lina_lnd_host: "127.0.0.1:10009"
lina_lnd_tls_cert_hex: ""
lina_lnd_tls_server_name: "localhost"
lina_lnd_macaroon_hex: ""
lina_lightning_network: "mainnet"

# MQTT broker address (plain + TLS listeners; see lina_mosquitto_* above)
lina_mqtt_broker: "127.0.0.1"

# Device ↔ MQTT (must match mosquitto / dynsec provisioning)
lina_device_mqtt_username: "device-service"
lina_device_mqtt_password: "change-me"
lina_mqtt_dynsec_admin_user: "dynsec_admin"
lina_mqtt_dynsec_admin_password: "change-me"

# Single-host ports (avoid collisions; REST and gRPC are loopback-only by default)
lina_device_api_addr: ":8080"
lina_ledger_listen_addr: ":8081"
lina_consumption_listen_addr: ":8082"
lina_lightning_listen_addr: ":8083"
lina_ledger_grpc_addr: ":9090"
lina_consumption_grpc_addr: ":9091"
lina_lightning_grpc_addr: ":9092"
lina_device_metrics_addr: ":9466"
lina_ledger_metrics_addr: ":9460"
lina_consumption_metrics_addr: ":9465"

# Caddy northbound reverse proxy (see roles/caddy; mirrors infrastructure/caddy/Caddyfile)
lina_caddy_listen: ":8080"
lina_caddy_admin: "127.0.0.1:2019"
lina_caddy_upstream_host: "127.0.0.1"

# Monitoring
lina_install_systemd_exporter: true
lina_process_exporter_version: "0.8.7"
lina_redis_exporter_version: "v1.80.1"
lina_systemd_exporter_version: "0.7.0"
lina_redis_exporter_listen: ":9121"
lina_process_exporter_listen: ":9256"
lina_systemd_exporter_listen: ":9558"
