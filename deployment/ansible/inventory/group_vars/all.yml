---
# Paths on the target host (see ansible.md)
lina_install_root: /opt/lina
lina_config_dir: /etc/lina
lina_lib_dir: /var/lib/lina

# Service DB_PATH values (see each service’s config / internal.SQLiteDBPath / PebbleStorePath).
# Ledger & consumption: REPOSITORY_TYPE plus DB_PATH (pebble: store dir; sqlite: path base, .db appended).
# Device: SQLite only; path base without .db unless you already include .db.
lina_repository_type: sqlite
lina_ledger_db_path: "{{ lina_lib_dir }}/ledger/ledger"
lina_consumption_db_path: "{{ lina_lib_dir }}/consumption/consumption"
lina_device_db_path: "{{ lina_lib_dir }}/device/devices"

# Binaries: build on the controller by default (requires Go on the machine running Ansible).
lina_build_binaries: true
lina_build_goos: linux
lina_build_goarch: arm64
lina_build_cgo_enabled: "0"
# Override repo root if ansible is not run from this repository layout
lina_repo_root: ""
# Override output dir; default is deployment/ansible/.build/<goos>-<goarch>
lina_build_output_dir: ""

# If lina_build_binaries is false: absolute path on the controller to pre-built
# device, ledger, consumption, lightning binaries.
lina_binaries_dir: ""

lina_mosquitto_tls_enable: true
lina_mosquitto_tls_port: 8883
lina_mosquitto_plain_port: 1883
# Dynamic Security + WebSockets: see roles/mosquitto/defaults/main.yml (lina_mosquitto_dynsec_*,
# lina_mosquitto_websocket_*). Dynsec admin must match device-service env below.
# Target paths (Ansible copies from controller; see lina_mosquitto_certs_src in mosquitto role defaults)
lina_mosquitto_cert_dir: /etc/lina/mosquitto
lina_mosquitto_cafile: /etc/lina/mosquitto/ca.crt
lina_mosquitto_certfile: /etc/lina/mosquitto/server.crt
lina_mosquitto_keyfile: /etc/lina/mosquitto/server.key
# Controller: directory with ca.crt, server.crt, server.key (empty = <repo>/infrastructure/certs)
lina_mosquitto_certs_src: ""

# Internal gRPC mTLS (device → ledger/lightning): edge.crt/edge.key from same cert dir as Mosquitto
lina_grpc_tls_enabled: true
# TLS verify name for shared server.crt (SAN includes localhost). Set to ledger after regenerating server cert with internal DNS SANs.
lina_grpc_tls_server_name: localhost

# Device MQTT client: use TLS to broker
lina_mqtt_use_tls: true
# Dev certs often do not match hostname; set false when using real DNS + matching cert
lina_mqtt_tls_skip_verify: true
lina_mqtt_tls_server_name: ""

# Redis — used by stream client env (REDIS_HOST / REDIS_PORT / REDIS_DB), not REDIS_ADDR.
# lightning-service uses the same vars as ledger/consumption/device (see internal.NewStreamClientFromEnv).
lina_redis_host: "127.0.0.1"
lina_redis_port: "6379"
# Optional password; leave empty for none
lina_redis_password: ""

# Redis stream consumer tuning (written as STREAM_READ_COUNT / STREAM_PARALLELISM in service env files)
lina_device_stream_read_count: 100
lina_device_stream_parallelism: 2
lina_ledger_stream_read_count: 100
lina_ledger_stream_parallelism: 2
lina_consumption_stream_read_count: 100
lina_consumption_stream_parallelism: 4

# Shared service auth
lina_service_token: "change-me-in-production"

# Lightning / LND (required for lightning-service; hex strings from your node)
lina_lnd_host: "192.168.0.130:10001"
lina_lnd_tls_cert_hex: ""
lina_lnd_tls_server_name: "localhost"
lina_lnd_macaroon_hex: ""
lina_lightning_network: "mainnet"

# MQTT broker address (plain + TLS listeners; see lina_mosquitto_* above).
# Docker Compose uses NanoMQ and device-service HTTP auth; this playbook still targets Mosquitto + dynsec.
lina_mqtt_broker: "127.0.0.1"

# Device ↔ MQTT (must match mosquitto / dynsec provisioning on Ansible-deployed edges)
lina_device_mqtt_username: "device-service"
lina_device_mqtt_password: "device-service_password"
lina_mqtt_dynsec_admin_user: "dynsec_admin"
lina_mqtt_dynsec_admin_password: "dynsec_admin_password"

# Northbound HTTP APIs: bind loopback only; external access is via Caddy (lina_caddy_listen).
# Device REST must not use Caddy's public port (8080).
lina_device_api_addr: "127.0.0.1:8084"
lina_ledger_listen_addr: "127.0.0.1:8081"
lina_consumption_listen_addr: "127.0.0.1:8082"
lina_lightning_listen_addr: "127.0.0.1:8083"
lina_ledger_grpc_addr: "127.0.0.1:9090"
lina_consumption_grpc_addr: "127.0.0.1:9091"
lina_lightning_grpc_addr: "127.0.0.1:9092"
# Metrics: bind all interfaces so Prometheus (or other scrapers) can reach this host from the network.
# Northbound REST/gRPC above stay on loopback; only /metrics endpoints are exposed this way.
lina_device_metrics_addr: ":9466"
lina_ledger_metrics_addr: ":9460"
lina_consumption_metrics_addr: ":9465"

# Caddy northbound reverse proxy (see roles/caddy; mirrors infrastructure/caddy/Caddyfile)
lina_caddy_listen: ":8080"
lina_caddy_admin: "127.0.0.1:2019"

# Monitoring — listen on all interfaces (same as :port below) for external scrape; host ports match
# docker-compose.evaluation.edge.yml. Prometheus container: PROMETHEUS_SCRAPE_JOBS=job:port,... + PROMETHEUS_TARGET_HOST.
lina_install_systemd_exporter: true
lina_process_exporter_version: "0.8.7"
lina_redis_exporter_version: "v1.80.1"
lina_systemd_exporter_version: "0.7.0"
lina_node_exporter_listen: ":9463"
lina_redis_exporter_listen: ":9461"
lina_process_exporter_listen: ":9256"
lina_systemd_exporter_listen: ":9558"
