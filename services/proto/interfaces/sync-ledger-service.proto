syntax = "proto3";
package lina.interfaces.sync.ledger;
option go_package = "github.com/robertodantas/lina/proto/gen/interfaces/ledger";

import "model/model-ledger-service.proto";

service LedgerService {
  // Creates a new authorization or returns the active one for the device.
  rpc CreateOrGetAuthorization(lina.model.ledger.CreateAuthorizationRequest)
      returns (lina.model.ledger.CreateAuthorizationResponse);
}