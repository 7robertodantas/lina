syntax = "proto3";
package lina.interfaces.sync.lightning;
option go_package = "github.com/robertodantas/lina/proto/gen/interfaces/lightning";

import "model/model-lightning-service.proto";

service LightningService {
  // Creates a Lightning invoice for the given device and amount.
  rpc CreateInvoice(lina.model.lightning.CreateInvoiceRequest)
      returns (lina.model.lightning.CreateInvoiceResponse);
}